# Deploy the Express API on Render (free tier works).
# Dashboard: https://dashboard.render.com → New → Blueprint → connect this repo.
# After deploy, set API_URL on Vercel to the Render service URL.

services:
  - type: web
    name: als-api
    runtime: node
    rootDir: apps/api
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: CORS_ORIGIN
        sync: false
      - key: CLOUDINARY_CLOUD_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_API_SECRET
        sync: false
      - key: CLOUDINARY_FOLDER
        value: als
