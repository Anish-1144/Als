# Production stack for a VPS.
#
#   docker compose up -d --build
#
# This VPS hosts multiple projects, so ports are pinned to avoid collisions:
#   web -> host 3002, api -> host loopback 4001.
# Only the web service is published publicly (host port 3002). Put a reverse
# proxy (nginx/Caddy/Traefik) in front of it for HTTPS and your domain.
# MongoDB is external (Atlas) — configured via MONGO_URI in .env.

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    # Loads MONGO_URI, JWT_SECRET, CLOUDINARY_*, CORS_ORIGIN, etc.
    env_file: .env
    environment:
      NODE_ENV: production
      # Authoritative API port for this stack (overrides PORT in .env).
      PORT: "4001"
    volumes:
      # Shared uploads/media: API writes here, web serves it.
      - media:/app/public/media
    # Internal to the compose network for the web container, PLUS bound to the
    # host's loopback so you can verify it on the VPS (curl localhost:4001/...).
    # It is NOT reachable from the public internet.
    ports:
      - "127.0.0.1:4001:4001"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        # Baked into the /api/v1/* rewrite at build time (see Dockerfile).
        # Must match the api service name + its PORT above.
        API_URL: http://api:4001
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # In-cluster address of the API container (used by the Next rewrite
      # and server-side fetches). Not exposed to the public internet.
      API_URL: http://api:4001
    volumes:
      # Read-only view of the same media volume so /media/* resolves.
      - media:/app/public/media:ro
    # Published on host 3002 (3000 is taken by another project on this VPS).
    ports:
      - "3002:3000"
    depends_on:
      - api

volumes:
  media:
